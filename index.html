<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Browser</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f8f9fa;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .filters {
      margin: 20px 0;
      text-align: center;
    }

    select,
    button {
      padding: 10px;
      font-size: 16px;
      margin: 5px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
    }

    .product {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .product h3 {
      margin-bottom: 10px;
    }

    .category {
      color: #666;
    }

    .price {
      color: green;
      font-weight: bold;
      margin-top: 8px;
    }

    .date {
      color: gray;
      font-size: 12px;
      margin-top: 8px;
    }

    .load-more {
      display: block;
      margin: 20px auto;
      padding: 12px 30px;
      font-size: 16px;
    }
  </style>

</head>

<body>

  <h1>🛒 Product Browser (100,000 Products)</h1>

  <div class="filters">
    <select id="category">
      <option value="">All Categories</option>
    </select>

```
<button onclick="loadProducts()">
  Show Products
</button>
```

  </div>

  <div id="products" class="products-grid"></div>

<button
id="loadMoreBtn"
class="load-more"
onclick="loadMore()"
style="display:none;"

>

```
Load More
```

  </button>

  <script>

    let currentCursor = null;
    let currentCategory = '';

    async function loadProducts() {

      currentCategory =
        document.getElementById('category').value;

      currentCursor = null;

      document.getElementById('products').innerHTML = '';

      document.getElementById('loadMoreBtn').style.display =
        'none';

      loadMore();
    }

    async function loadMore() {

      let url =
        'https://product-browser-api-c5ca.onrender.com/api/products?limit=30';

      if (currentCategory) {
        url += `&category=${currentCategory}`;
      }

      if (currentCursor) {
        url += `&cursor=${currentCursor}`;
      }

      const res = await fetch(url);
      const data = await res.json();

      const container =
        document.getElementById('products');

      data.products.forEach(product => {

        const div =
          document.createElement('div');

        div.className = 'product';

        div.innerHTML = `
          <h3>${product.name}</h3>

          <p class="category">
            📂 ${product.category}
          </p>

          <p class="price">
            ₹${product.price.toLocaleString()}
          </p>

          <p class="date">
            Created:
            ${new Date(
              product.createdAt
            ).toLocaleDateString()}
          </p>
        `;

        container.appendChild(div);

      });

      currentCursor = data.nextCursor;

      document.getElementById('loadMoreBtn').style.display =
        data.hasMore ? 'block' : 'none';
    }

    window.onload = () => {

      const categories = [
        "Electronics",
        "Fashion",
        "Books",
        "Home & Kitchen",
        "Sports",
        "Beauty",
        "Toys"
      ];

      const select =
        document.getElementById("category");

      categories.forEach(category => {

        const option =
          document.createElement("option");

        option.value = category;
        option.textContent = category;

        select.appendChild(option);

      });

      loadProducts();
    };

  </script>

</body>
</html>
